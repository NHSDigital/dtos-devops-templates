- task: PublishBuildArtifacts@1
  displayName: 'Publish Playwright Test Reports'
  inputs:
    PathtoPublish: '$(System.DefaultWorkingDirectory)/${{ parameters.testProjectDirectory }}/src/config/playwright-report'
    ArtifactName: 'PlaywrightHTMLReport'
    publishLocation: 'Container'

- task: PublishTestResults@2
  displayName: 'Publish JUnit Test Results'
  condition: succeeded()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: $(System.DefaultWorkingDirectory)/${{ parameters.testProjectDirectory }}/src/config/playwright-report/results.xml
    failTaskOnFailedTests: true
    mergeTestResults: true
    publishRunAttachments: true



- script: |
    SCRIPT_PATH="$(Build.SourcesDirectory)/integration_scripts/integrations/slack/SlackIntegrator.py"

    if [ ! -f "$SCRIPT_PATH" ]; then
      echo "Error: SlackIntegrator script file not found at $SCRIPT_PATH"
      echo "##vso[task.logissue type=error]Script file not found at $SCRIPT_PATH"
      echo "Please consider running a checkout on the repository at a given commit ID."

      echo "##vso[task.setvariable variable=hasFile;isOutput=true]false"
    else
      echo "Script file found: $SCRIPT_PATH"

      echo "##vso[task.setvariable variable=hasFile;isOutput=true]true"
    fi
  displayName: "Notify - Check for SlackIntegrator.py"
  name: checkScriptPath
  condition: succeeded()

- script: |
    if [ -n "${SLACK_WEBHOOK:-}" ]; then
      echo "##vso[task.setvariable variable=envSlackWebhook]$(SLACK_WEBHOOK)"
      URL_SOURCE="Environment"
    else
      echo "##vso[task.setvariable variable=envSlackWebhook]${{ parameters.slackWebHook }}"
      URL_SOURCE="Parameters"
    fi
    echo "URL source: $URL_SOURCE"
  displayName: "Notify - Resolve Slack Webhook URL"
  condition: succeeded()

- task: PythonScript@0
  displayName: 'Notify - Run Python Script'
  condition: and(
    and(succeeded(), ne('$(envSlackWebhook)', '')),
    eq(variables['hasFile'], 'true')
    )
  env:
    slackWebHook: $(envSlackWebhook)
  inputs:
    scriptSource: 'filePath'
    scriptPath: '$(Build.SourcesDirectory)/integration_scripts/integrations/slack/SlackIntegrator.py'
    arguments: >
      -env $(ENVIRONMENT)
      --report_path $(System.DefaultWorkingDirectory)/${{ parameters.testProjectDirectory }}/src/config/playwright-report/results.xml
      --build_url $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)
      -d $(Build.BuildId)
      -m $(Build.BuildNumber)
      -u $(Build.RequestedFor)'
      -webhook $(slackWebHook)
