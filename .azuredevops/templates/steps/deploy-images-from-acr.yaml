---

parameters:
  - name: serviceConnection
    type: string

steps:
  - task: AzureCLI@2
    name: deploy_images
    displayName: Deploy images with tag $(ADD_IMAGE_TAG)
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      addSpnToEnvironment: true
      failOnStandardError: false
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        # Prerequisite: A DNS A record for the chosen Dev ACR must exist in the Prod privatelink.azurecr.io zone, resolving to the public IP for that ACR
        set -eo pipefail
        declare -a pids

        wait_for_completion() {
          # acr tasks are backgrounded for parallelism
          local -n arr=$1
          for pid in "${arr[@]}"; do
            wait ${pid}
          done
        }

        [[ "${DEST_REGISTRY}" =~ dev ]] && az account set -s ${TF_VAR_HUB_SUBSCRIPTION_ID}

        functionApps=$(az functionapp list --resource-group $(FUNCTION_RESOURCE_GROUP) --query "[].name" -o tsv)
        for functionApp in $functionApps; do

          imageName=$(echo $functionApp | sed "s/^$(ENVIRONMENT_SHORT)-uks-//")
          echo "##[debug] Deploying ${imageName}:${ADD_IMAGE_TAG} to ${functionApp}..."

          # Output the command to be run for debugging purposes:
          echo "##[debug] az functionapp config container set --name $imageName --resource-group $(FUNCTION_RESOURCE_GROUP) --docker-custom-image-name ${DEST_REGISTRY}.azurecr.io/${imageName}:${ADD_IMAGE_TAG} --registry-server https://${DEST_REGISTRY}.azurecr.io"

          # Uncomment the following line to actually push the new image to the function app. Note that this also causes the function app to restart.
          # az functionapp config container set --name $imageName --resource-group $(FUNCTION_RESOURCE_GROUP) --docker-custom-image-name ${DEST_REGISTRY}.azurecr.io/${imageName}:${ADD_IMAGE_TAG} --registry-server https://${DEST_REGISTRY}.azurecr.io &

          pids+=($!)
        done
        wait_for_completion pids
        echo "##[debug] All images imported"
